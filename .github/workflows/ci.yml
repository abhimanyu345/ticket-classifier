name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic transformers torch \
                      prometheus-fastapi-instrumentator prometheus-client \
                      numpy pytest httpx

      - name: Run tests
        run: pytest tests/ -v

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check api/ src/